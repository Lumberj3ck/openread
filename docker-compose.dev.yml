services:
  backend:
    build:
      context: ./backend
      target: dev
    env_file: .env
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:?GROQ_API_KEY is required}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - backend-go-mod:/go/pkg/mod
      - backend-go-build:/root/.cache/go-build
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
      target: dev
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  backend-data:
  backend-go-build:
  backend-go-mod:
  frontend-node-modules:
